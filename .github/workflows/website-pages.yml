name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website-app/**'
      - 'install.sh'
      - 'build/fetch_latest_release_for_website.py'
      - '.github/workflows/website-pages.yml'
  release:
    types: [published]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare website for publishing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch website/.nojekyll
          cp install.sh website/install.sh
          python3 ./build/fetch_latest_release_for_website.py

      - name: Deploy website to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./website-app/.output/public
