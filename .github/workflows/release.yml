name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── CLI: cross-compile all 6 targets from a single runner ──
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI binaries for all platforms
        run: |
          mkdir -p dist
          cd src
          GOOS=windows GOARCH=amd64 go build -o ../dist/env-sync-windows-amd64.exe    -ldflags "-s -w" ./cmd/env-sync
          GOOS=windows GOARCH=arm64 go build -o ../dist/env-sync-windows-arm64.exe    -ldflags "-s -w" ./cmd/env-sync
          GOOS=darwin  GOARCH=amd64 go build -o ../dist/env-sync-macos-amd64          -ldflags "-s -w" ./cmd/env-sync
          GOOS=darwin  GOARCH=arm64 go build -o ../dist/env-sync-macos-arm64          -ldflags "-s -w" ./cmd/env-sync
          GOOS=linux   GOARCH=arm64 go build -o ../dist/env-sync-linux-arm64          -ldflags "-s -w" ./cmd/env-sync
          GOOS=linux   GOARCH=amd64 go build -o ../dist/env-sync-linux-amd64          -ldflags "-s -w" ./cmd/env-sync

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: dist/

  # ── GUI: native build per OS (CGO required for WebView) ──
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: gui-linux
          - os: macos-latest
            artifact_name: gui-macos
          - os: windows-latest
            artifact_name: gui-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/gui/frontend/package-lock.json

      - name: Set GUI metadata version
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("src/gui/wails.json")
          data = json.loads(path.read_text())
          data.setdefault("info", {})["productVersion"] = os.environ["GITHUB_REF_NAME"].lstrip("v")
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Install Wails CLI
        if: runner.os != 'Linux'
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux dependencies (amd64 + arm64 cross)
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing sources to amd64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi

          # Add arm64 sources from ports.ubuntu.com
          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources > /dev/null
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates
          Components: main restricted universe multiverse
          Architectures: arm64
          SOURCES

          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config \
            gcc-aarch64-linux-gnu \
            libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64

      - name: Build GUI binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"

          cd src/gui/frontend
          npm ci
          npm run build
          cd ../../

          cd src
          CGO_ENABLED=1 go build -tags desktop,production,webkit2_41 -ldflags "-s -w" \
            -o ../dist/env-sync-gui-linux-amd64 ./gui
          CC=aarch64-linux-gnu-gcc \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          CGO_ENABLED=1 GOARCH=arm64 go build -tags desktop,production,webkit2_41 -ldflags "-s -w" \
            -o ../dist/env-sync-gui-linux-arm64 ./gui
          cd ..

          for arch in amd64 arm64; do
            package_root="packaging/linux-${arch}"
            payload_dir="${package_root}/payload"
            deb_root="${package_root}/deb"

            rm -rf "$package_root"
            mkdir -p "$payload_dir" \
              "$deb_root/DEBIAN" \
              "$deb_root/opt/env-sync" \
              "$deb_root/usr/bin" \
              "$deb_root/usr/share/applications" \
              "$deb_root/usr/share/icons/hicolor/512x512/apps"

            cp "dist/env-sync-gui-linux-${arch}" "$payload_dir/env-sync-gui"
            chmod 755 "$payload_dir/env-sync-gui"
            cp "src/gui/build/appicon.png" "$payload_dir/env-sync-gui.png"

            cat <<'EOF' | sed 's/^          //' > "$payload_dir/env-sync-gui.desktop"
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=env-sync
          Comment=Distributed secrets synchronization for local networks
          Exec=__ENV_SYNC_GUI_EXEC__
          Icon=__ENV_SYNC_GUI_ICON__
          Terminal=false
          Categories=Utility;Development;
          Keywords=env;sync;secrets;
          StartupWMClass=env-sync-gui
          EOF

            cp "$payload_dir/env-sync-gui" "$deb_root/opt/env-sync/env-sync-gui"
            ln -s /opt/env-sync/env-sync-gui "$deb_root/usr/bin/env-sync-gui"
            cp "$payload_dir/env-sync-gui.png" "$deb_root/usr/share/icons/hicolor/512x512/apps/env-sync-gui.png"
            sed \
              -e 's#__ENV_SYNC_GUI_EXEC__#/opt/env-sync/env-sync-gui#' \
              -e 's#__ENV_SYNC_GUI_ICON__#env-sync-gui#' \
              "$payload_dir/env-sync-gui.desktop" > "$deb_root/usr/share/applications/env-sync-gui.desktop"

            cat <<EOF | sed 's/^          //' > "$deb_root/DEBIAN/control"
          Package: env-sync-gui
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${arch}
          Maintainer: Arnav Gupta <dev@championswimmer.in>
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0 | libwebkit2gtk-4.0-37
          Description: env-sync desktop GUI
           Distributed secrets synchronization for local networks.
          EOF

            cat <<'EOF' | sed 's/^          //' > "$deb_root/DEBIAN/postinst"
          #!/bin/sh
          set -e
          if command -v update-desktop-database >/dev/null 2>&1; then
            update-desktop-database /usr/share/applications >/dev/null 2>&1 || true
          fi
          if command -v gtk-update-icon-cache >/dev/null 2>&1; then
            gtk-update-icon-cache -q /usr/share/icons/hicolor >/dev/null 2>&1 || true
          fi
          EOF

            cat <<'EOF' | sed 's/^          //' > "$deb_root/DEBIAN/postrm"
          #!/bin/sh
          set -e
          if command -v update-desktop-database >/dev/null 2>&1; then
            update-desktop-database /usr/share/applications >/dev/null 2>&1 || true
          fi
          if command -v gtk-update-icon-cache >/dev/null 2>&1; then
            gtk-update-icon-cache -q /usr/share/icons/hicolor >/dev/null 2>&1 || true
          fi
          EOF

            chmod 755 "$deb_root/DEBIAN/postinst" "$deb_root/DEBIAN/postrm"

            tar -C "$payload_dir" -czf "dist/env-sync-gui-linux-${arch}.tar.gz" .
            dpkg-deb --build "$deb_root" "dist/env-sync-gui-linux-${arch}.deb"
          done

      - name: Build GUI package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cd src/gui
          for arch in amd64 arm64; do
            rm -rf build/bin
            PATH="$HOME/go/bin:$PATH" \
            CGO_ENABLED=1 \
            CGO_LDFLAGS="-framework UniformTypeIdentifiers" \
            wails build -clean -pack -platform "darwin/${arch}"

            stage_dir="$(mktemp -d)"
            cp -R build/bin/env-sync.app "$stage_dir/env-sync.app"
            hdiutil create \
              -volname "env-sync" \
              -srcfolder "$stage_dir" \
              -ov \
              -format UDZO \
              "../../dist/env-sync-gui-macos-${arch}.dmg"
            rm -rf "$stage_dir"
          done

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install nsis --no-progress -y

      - name: Build GUI packages (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Set-Location src/gui
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          $env:CGO_ENABLED = "1"
          wails build -clean -pack -nsis -platform windows/amd64

          $portable = Get-ChildItem build/bin -Filter '*.exe' | Where-Object { $_.Name -notmatch 'installer|setup' } | Select-Object -First 1
          if (-not $portable) {
            throw "Portable GUI executable not found"
          }

          $installer = Get-ChildItem build/bin -Filter '*.exe' | Where-Object { $_.Name -match 'installer|setup' } | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer not found"
          }

          Copy-Item $installer.FullName ../../dist/env-sync-gui-windows-amd64-installer.exe
          Compress-Archive -Path $portable.FullName -DestinationPath ../../dist/env-sync-gui-windows-amd64-portable.zip -Force

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/env-sync-gui-*

  # ── Collect everything and publish the GitHub Release ──
  release:
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: dist/

      - name: Download GUI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gui-*
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
