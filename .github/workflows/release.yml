name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── CLI: cross-compile all 6 targets from a single runner ──
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI binaries for all platforms
        run: |
          mkdir -p dist
          cd src
          GOOS=windows GOARCH=amd64 go build -o ../dist/env-sync-windows-amd64.exe    -ldflags "-s -w" ./cmd/env-sync
          GOOS=windows GOARCH=arm64 go build -o ../dist/env-sync-windows-arm64.exe    -ldflags "-s -w" ./cmd/env-sync
          GOOS=darwin  GOARCH=amd64 go build -o ../dist/env-sync-macos-amd64          -ldflags "-s -w" ./cmd/env-sync
          GOOS=darwin  GOARCH=arm64 go build -o ../dist/env-sync-macos-arm64          -ldflags "-s -w" ./cmd/env-sync
          GOOS=linux   GOARCH=arm64 go build -o ../dist/env-sync-linux-arm64          -ldflags "-s -w" ./cmd/env-sync
          GOOS=linux   GOARCH=amd64 go build -o ../dist/env-sync-linux-amd64          -ldflags "-s -w" ./cmd/env-sync

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: dist/

  # ── GUI: native build per OS (CGO required for WebView) ──
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/gui/frontend/package-lock.json

      - name: Install Linux dependencies (amd64 + arm64 cross)
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing sources to amd64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi

          # Add arm64 sources from ports.ubuntu.com
          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources > /dev/null
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates
          Components: main restricted universe multiverse
          Architectures: arm64
          SOURCES

          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config \
            gcc-aarch64-linux-gnu \
            libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64

      - name: Build frontend
        working-directory: src/gui/frontend
        run: |
          npm ci
          npm run build

      - name: Build GUI binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cd src
          CGO_ENABLED=1 go build -tags webkit2_41 -ldflags "-s -w" \
            -o ../dist/env-sync-gui-linux-amd64 ./gui
          CC=aarch64-linux-gnu-gcc \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          CGO_ENABLED=1 GOARCH=arm64 go build -tags webkit2_41 -ldflags "-s -w" \
            -o ../dist/env-sync-gui-linux-arm64 ./gui

      - name: Build GUI binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cd src
          CGO_ENABLED=1 GOARCH=arm64 go build -ldflags "-s -w" \
            -o ../dist/env-sync-gui-macos-arm64 ./gui
          CGO_ENABLED=1 GOARCH=amd64 go build -ldflags "-s -w" \
            -o ../dist/env-sync-gui-macos-amd64 ./gui

      - name: Build GUI binaries (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cd src
          CGO_ENABLED=1 go build -ldflags "-s -w" \
            -o ../dist/env-sync-gui-windows-amd64.exe ./gui

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ runner.os }}
          path: dist/env-sync-gui-*

  # ── Collect everything and publish the GitHub Release ──
  release:
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: dist/

      - name: Download GUI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gui-*
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
