name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries for all platforms
        run: |
          mkdir -p dist
          cd src

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -o ../dist/env-sync-windows-amd64.exe -ldflags "-s -w" ./cmd/env-sync

          # Windows ARM64
          GOOS=windows GOARCH=arm64 go build -o ../dist/env-sync-windows-arm64.exe -ldflags "-s -w" ./cmd/env-sync

          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -o ../dist/env-sync-darwin-amd64 -ldflags "-s -w" ./cmd/env-sync

          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build -o ../dist/env-sync-darwin-arm64 -ldflags "-s -w" ./cmd/env-sync

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -o ../dist/env-sync-linux-arm64 -ldflags "-s -w" ./cmd/env-sync

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -o ../dist/env-sync-linux-amd64 -ldflags "-s -w" ./cmd/env-sync

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/env-sync-windows-amd64.exe
            dist/env-sync-windows-arm64.exe
            dist/env-sync-darwin-arm64
            dist/env-sync-linux-arm64
            dist/env-sync-linux-amd64
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
