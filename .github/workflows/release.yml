name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── CLI: cross-compile all 6 targets from a single runner ──
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI binaries for all platforms
        shell: bash
        run: bash ./build/build_cli.sh

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: dist/

  # ── GUI: native build per OS (CGO required for WebView) ──
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: gui-linux-amd64
            gui_arch: amd64
          - os: ubuntu-24.04-arm
            artifact_name: gui-linux-arm64
            gui_arch: arm64
          - os: macos-latest
            artifact_name: gui-macos
          - os: windows-latest
            artifact_name: gui-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/gui/frontend/package-lock.json

      - name: Set GUI metadata version
        shell: bash
        run: python ./build/set_gui_metadata_version.py

      - name: Install Wails CLI
        if: runner.os != 'Linux'
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux dependencies (amd64 + arm64 cross)
        if: runner.os == 'Linux'
        shell: bash
        run: TARGET_ARCH=${{ matrix.gui_arch }} bash ./build/install_linux_gui_deps.sh

      - name: Build GUI binaries (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: TARGET_ARCH=${{ matrix.gui_arch }} bash ./build/build_gui_linux.sh

      - name: Build GUI package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: bash ./build/build_gui_macos.sh

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install nsis --no-progress -y

      - name: Build GUI packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./build/build_gui_windows.ps1

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/env-sync-gui-*

  # ── Collect everything and publish the GitHub Release ──
  release:
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: dist/

      - name: Download GUI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gui-*
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: bash ./build/generate_checksums.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
