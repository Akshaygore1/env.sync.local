name: BATS Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GNU parallel
        run: |
          sudo apt-get update
          sudo apt-get install -y parallel

      - name: Install BATS
        run: |
          git clone https://github.com/bats-core/bats-core.git
          cd bats-core
          sudo ./install.sh /usr/local
          cd ..
          rm -rf bats-core

      - name: Verify BATS installation
        run: bats --version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Go Tests
        run: make test

      - name: Run Docker Tests (Go)
        run: ./tests/test-dockers.sh --debug

      - name: Verify Version (Go)
        run: |
          ./tests/start-test-env.sh
          docker exec env-sync-alpha env-sync --version
          ./tests/start-test-env.sh --stop
