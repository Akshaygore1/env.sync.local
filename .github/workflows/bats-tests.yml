name: BATS Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GNU parallel
        run: |
          sudo apt-get update
          sudo apt-get install -y parallel

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install BATS via NPM
        run: npm install -g bats

      - name: Verify BATS installation
        run: bats --version

      - name: Run Docker Tests
        run: ./test-dockers.sh
